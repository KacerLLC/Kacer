<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Kacer | Site Under Development</title>
  <meta name="description" content="Kacer.co is currently under development. Contact Kacer at sound@kacer.co." />
  <meta name="theme-color" content="#06101f" />
  <style>
    :root {
      --bg-1: #030814;
      --bg-2: #071225;
      --bg-3: #0a1d39;
      --panel-1: rgba(5, 16, 31, 0.96);
      --panel-2: rgba(7, 20, 40, 0.96);
      --line: rgba(110, 190, 255, 0.18);
      --text: #eef7ff;
      --muted: #8db9df;
      --accent-1: #d9f3ff;
      --accent-2: #78c8ff;
      --accent-3: #2a9fff;
      --accent-4: #0b69d1;
      --glow: rgba(69, 168, 255, 0.22);
      --shadow: rgba(0, 0, 0, 0.56);
      --radius: 28px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 14% 18%, rgba(88, 173, 255, 0.14), transparent 26%),
        radial-gradient(circle at 86% 16%, rgba(34, 114, 255, 0.14), transparent 24%),
        radial-gradient(circle at 52% 84%, rgba(65, 162, 255, 0.10), transparent 30%),
        linear-gradient(145deg, var(--bg-1) 0%, var(--bg-2) 50%, var(--bg-3) 100%);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.18;
      background-image:
        linear-gradient(rgba(255,255,255,0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.035) 1px, transparent 1px);
      background-size: 42px 42px;
      mask-image: radial-gradient(circle at center, black 0%, transparent 80%);
    }

    .page {
      width: min(1180px, calc(100vw - 32px));
      margin: 24px auto;
      position: relative;
      z-index: 1;
    }

    .shell {
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(6, 18, 35, 0.98), rgba(3, 10, 20, 0.98));
      box-shadow:
        0 34px 90px var(--shadow),
        inset 0 0 0 1px rgba(199, 234, 255, 0.04),
        0 0 60px var(--glow);
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1.55fr) minmax(320px, 0.75fr);
      min-height: 720px;
    }

    .art-wrap {
      position: relative;
      overflow: hidden;
      background: #020b18;
      min-height: 520px;
    }

    .art-wrap::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      background:
        linear-gradient(90deg, rgba(2, 10, 22, 0.04) 0%, rgba(4, 16, 34, 0.10) 36%, rgba(4, 16, 34, 0.52) 100%),
        linear-gradient(0deg, rgba(3, 11, 22, 0.18), rgba(3, 11, 22, 0.06)),
        radial-gradient(circle at 18% 24%, rgba(100, 192, 255, 0.14), transparent 28%),
        radial-gradient(circle at 80% 20%, rgba(45, 126, 255, 0.18), transparent 24%);
      mix-blend-mode: screen;
    }

    .art-wrap::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 3;
      pointer-events: none;
      background: linear-gradient(90deg, transparent 50%, rgba(3, 11, 23, 0.78) 100%);
    }

    .band-art {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scale(1.01);
      filter: saturate(1.02) contrast(1.03);
    }

    .content {
      position: relative;
      z-index: 4;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 12px;
      padding: clamp(32px, 5vw, 66px);
      background:
        linear-gradient(180deg, rgba(7, 19, 38, 0.84), rgba(3, 12, 25, 0.96)),
        radial-gradient(circle at 22% 20%, rgba(82, 179, 255, 0.12), transparent 26%);
    }

    h1 {
      margin: 0;
      font-size: clamp(3rem, 7vw, 6rem);
      line-height: 0.92;
      letter-spacing: -0.07em;
      font-weight: 900;
      color: var(--accent-1);
      text-transform: uppercase;
      text-shadow:
        0 0 18px rgba(116, 199, 255, 0.34),
        0 0 44px rgba(31, 132, 255, 0.20);
    }

    .accent {
      background: linear-gradient(90deg, var(--accent-1) 0%, var(--accent-2) 40%, var(--accent-3) 72%, #9edcff 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .subtitle {
      margin: 0;
      font-size: clamp(1.25rem, 2.7vw, 2.1rem);
      line-height: 1.08;
      color: #f0f8ff;
      font-weight: 760;
      letter-spacing: -0.03em;
      text-shadow: 0 0 18px rgba(92, 177, 255, 0.12);
    }

    .footer-bar {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 18px;
      min-height: 72px;
      padding: 18px 24px 22px;
      border-top: 1px solid rgba(113, 189, 255, 0.14);
      background:
        linear-gradient(180deg, rgba(4, 13, 26, 0.94), rgba(3, 10, 20, 0.99)),
        radial-gradient(circle at 50% 0%, rgba(58, 152, 255, 0.10), transparent 34%);
      text-align: center;
      flex-wrap: wrap;
    }

    .email {
      color: #e5f5ff;
      text-decoration: none;
      font-weight: 700;
      letter-spacing: 0.01em;
      padding: 10px 16px;
      border: 1px solid rgba(120, 199, 255, 0.22);
      border-radius: 999px;
      background: linear-gradient(180deg, rgba(18, 72, 136, 0.28), rgba(9, 45, 98, 0.24));
      box-shadow:
        inset 0 0 0 1px rgba(210, 236, 255, 0.03),
        0 0 22px rgba(43, 145, 255, 0.12);
      transition: transform 180ms ease, background 180ms ease, border-color 180ms ease, box-shadow 180ms ease;
    }

    .email:hover,
    .email:focus-visible {
      transform: translateY(-1px);
      background: linear-gradient(180deg, rgba(28, 96, 176, 0.34), rgba(10, 54, 120, 0.30));
      border-color: rgba(151, 213, 255, 0.32);
      box-shadow:
        inset 0 0 0 1px rgba(210, 236, 255, 0.04),
        0 0 28px rgba(57, 161, 255, 0.18);
      outline: none;
    }

    .status {
      color: var(--muted);
      font-size: 0.96rem;
    }

    @media (max-width: 980px) {
      .hero {
        grid-template-columns: 1fr;
        min-height: auto;
      }

      .art-wrap {
        aspect-ratio: 1 / 1;
        min-height: auto;
      }

      .art-wrap::after {
        background: linear-gradient(0deg, rgba(3, 11, 23, 0.66), transparent 36%);
      }

      .content {
        min-height: 220px;
        justify-content: center;
      }
    }

    @media (max-width: 560px) {
      .page {
        width: min(100vw - 16px, 1180px);
        margin: 8px auto;
      }

      .shell {
        border-radius: 20px;
      }

      .content {
        padding: 26px 22px 28px;
      }

      .footer-bar {
        padding: 16px 18px 20px;
      }
    }
  </style>
</head>
<body>
  <main class="page" aria-label="Kacer temporary homepage">
    <section class="shell">
      <div class="hero">
        <div class="art-wrap" aria-label="Kacer electronic music equipment artwork">
          <img class="band-art" src="neon_lit_futuristic_music_studio_setup.png" alt="Kacer band equipment artwork with synthesizers, bass guitar, studio monitors, controllers, and blue neon lighting." />
        </div>
        <div class="content">
          <h1><span class="accent">Kacer</span></h1>
          <p class="subtitle">Site Under Development</p>
        </div>
      </div>

      <div class="footer-bar">
        <a class="email" href="mailto:sound@kacer.co">sound@kacer.co</a>
        <span class="status">Temporary homepage for kacer.co</span>
      </div>
    </section>
  </main>
</body>
</html>
